<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX | Finalize seu Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gold-border { border: 1px solid #d4af37; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="bg-black text-white font-sans antialiased">

    <div class="min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-900 to-black">
        
        <div class="bg-gray-900 p-8 rounded-3xl gold-border gold-glow text-center max-w-sm w-full border-opacity-30">
            
            <h1 class="text-2xl font-black mb-2 text-white">QUASE LÁ!</h1>
            <p class="text-gray-400 mb-8 text-sm">Escaneie o código abaixo para liberar seu acesso instantaneamente.</p>
            
            <div class="flex justify-center mb-8 bg-white p-4 rounded-2xl">
                <img src="data:image/jpeg;base64,{{ qr_code_base64 }}" alt="QR Code PIX" class="w-48 h-48">
            </div>
            
            <p class="text-xs text-gray-500 mb-2 uppercase tracking-widest font-bold">Pix Copia e Cola</p>
            
            <div class="relative">
                <textarea readonly id="pixCode" 
                          class="w-full p-4 text-xs bg-black border border-gray-800 rounded-xl text-gray-300 font-mono mb-4 focus:outline-none" 
                          rows="3">{{ copia_cola }}</textarea>
                
                <button onclick="copiarPix()" 
                        class="w-full bg-gray-800 hover:bg-gray-700 py-2 rounded-lg text-xs font-bold transition">
                    CLIQUE PARA COPIAR
                </button>
            </div>

            <p class="text-[10px] text-gray-600 mt-6">O acesso será enviado automaticamente para seu e-mail após a confirmação.</p>
        </div>

    </div>

    <script>
        function copiarPix() {
            const copyText = document.getElementById("pixCode");
            copyText.select();
            document.execCommand("copy");
            alert("Código PIX copiado com sucesso!");
        }
    </script>
</body>
</html>
